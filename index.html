<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>볼링장 QR 주문</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f5; margin:0; padding:16px; color:#111; }
    .wrap { max-width:900px; margin:0 auto; }
    .card { background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    h1,h2,h3 { margin:0 0 10px; }
    .muted { color:#666; font-size:14px; }
    input, select, textarea { width:100%; padding:12px; margin:6px 0; border:1px solid #ddd; border-radius:10px; font-size:16px; box-sizing:border-box; }
    button { border:0; border-radius:10px; padding:10px 14px; background:#111; color:#fff; font-weight:bold; cursor:pointer; margin:3px; }
    button.gray { background:#e5e7eb; color:#111; }
    button.red { background:#fee2e2; color:#991b1b; }
    button.green { background:#dcfce7; color:#166534; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .between { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:10px; }
    .item { border:1px solid #e5e7eb; border-radius:12px; padding:12px; }
    .hidden { display:none; }
    .line { display:flex; justify-content:space-between; margin:8px 0; }
    .ok { color:#166534; font-weight:bold; }
    .bad { color:#991b1b; font-weight:bold; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card between">
    <div>
      <h1>볼링장 QR 주문</h1>
      <div id="status" class="muted">사이트 준비 중...</div>
    </div>
    <button class="gray" onclick="location.href='?admin=1'">관리자</button>
  </div>

  <div id="customerPage">
    <div class="card">
      <h2><span id="laneText">1</span>번 레인 주문</h2>
      <p class="muted">메뉴를 선택하고 주문하기를 눌러주세요.</p>
    </div>

    <div class="card">
      <h2>메뉴</h2>
      <div id="menuList" class="grid"></div>
    </div>

    <div class="card">
      <h2>주문 내역</h2>
      <div id="cartList" class="muted">선택한 메뉴가 없습니다.</div>
      <textarea id="requestText" placeholder="요청사항 예: 얼음컵 주세요"></textarea>
      <div class="between"><strong>총 금액</strong><strong id="totalText">0원</strong></div>
      <button style="width:100%; padding:15px; margin-top:10px;" onclick="submitOrder()">주문하기</button>
    </div>
  </div>

  <div id="adminPage" class="hidden">
    <div id="loginBox" class="card">
      <h2>관리자 로그인</h2>
      <p class="muted">비밀번호: 1234</p>
      <input id="password" type="password" placeholder="비밀번호 입력" />
      <button style="width:100%;" onclick="loginAdmin()">로그인</button>
    </div>

    <div id="adminBox" class="hidden">
      <div class="card">
        <h2>실시간 주문</h2>
        <div class="row">
          <button onclick="seedMenu()">기본 메뉴 넣기</button>
          <button class="gray" onclick="testFirebase()">Firebase 연결 테스트</button>
        </div>
        <div id="orderList" class="muted">주문 불러오는 중...</div>
      </div>

      <div class="card">
        <h2>메뉴 추가/수정</h2>
        <input id="editId" type="hidden" />
        <input id="menuName" placeholder="메뉴명 예: 카스 병맥주" />
        <input id="menuPrice" type="number" placeholder="가격 예: 5000" />
        <select id="menuCategory">
          <option value="맥주">맥주</option>
          <option value="음료">음료</option>
          <option value="과자">과자</option>
          <option value="기타">기타</option>
        </select>
        <select id="menuSoldOut">
          <option value="false">판매중</option>
          <option value="true">품절</option>
        </select>
        <button style="width:100%;" onclick="saveMenu()">메뉴 저장</button>
        <button class="gray" style="width:100%;" onclick="clearMenuForm()">새 메뉴 입력</button>
      </div>

      <div class="card">
        <h2>현재 메뉴</h2>
        <div id="adminMenuList" class="muted">메뉴 불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA7J7yCOVWdAo1zLx-AxYGL_dpUmmTZTho",
    authDomain: "hardrock-ea1db.firebaseapp.com",
    projectId: "hardrock-ea1db",
    storageBucket: "hardrock-ea1db.firebasestorage.app",
    messagingSenderId: "448195527991",
    appId: "1:448195527991:web:c612b42544b1b43ec1c6b2"
  };

  const ADMIN_PASSWORD = "1234";
  let db;
  let menus = [];
  let cart = {};
  let lane = "1";

  function $(id) { return document.getElementById(id); }
  function won(n) { return Number(n || 0).toLocaleString('ko-KR') + '원'; }

  function start() {
    try {
      const params = new URLSearchParams(location.search);
      lane = params.get('lane') || '1';
      const isAdmin = params.get('admin') === '1';

      $('laneText').innerText = lane;

      if (isAdmin) {
        $('customerPage').classList.add('hidden');
        $('adminPage').classList.remove('hidden');
        $('status').innerHTML = '<span class="ok">관리자 화면 준비 완료</span>';
      } else {
        $('status').innerHTML = '<span class="ok">' + lane + '번 레인 손님 화면 준비 완료</span>';
      }

      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      $('status').innerHTML += '<br><span class="ok">Firebase 연결 코드 실행됨</span>';

      listenMenus();
    } catch (error) {
      $('status').innerHTML = '<span class="bad">초기 실행 오류: ' + error.message + '</span>';
      alert('초기 실행 오류: ' + error.message);
    }
  }

  function listenMenus() {
    db.collection('menus').onSnapshot(function(snapshot) {
      menus = [];
      snapshot.forEach(function(doc) {
        menus.push({ id: doc.id, ...doc.data() });
      });
      menus.sort(function(a,b) {
        return String(a.category || '').localeCompare(String(b.category || '')) || String(a.name || '').localeCompare(String(b.name || ''));
      });
      renderMenus();
      renderAdminMenus();
    }, function(error) {
      $('status').innerHTML += '<br><span class="bad">메뉴 불러오기 실패: ' + error.message + '</span>';
      $('menuList').innerHTML = '<p class="bad">메뉴 불러오기 실패: ' + error.message + '</p>';
      if ($('adminMenuList')) $('adminMenuList').innerHTML = '<p class="bad">메뉴 불러오기 실패: ' + error.message + '</p>';
    });
  }

  function listenOrders() {
    db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(function(snapshot) {
      const orders = [];
      snapshot.forEach(function(doc) {
        orders.push({ id: doc.id, ...doc.data() });
      });
      renderOrders(orders);
    }, function(error) {
      $('orderList').innerHTML = '<p class="bad">주문 불러오기 실패: ' + error.message + '</p>';
    });
  }

  function renderMenus() {
    if (menus.length === 0) {
      $('menuList').innerHTML = '<p class="muted">등록된 메뉴가 없습니다. 관리자에서 메뉴를 추가해주세요.</p>';
      renderCart();
      return;
    }

    $('menuList').innerHTML = menus.map(function(item) {
      return '<div class="item">' +
        '<h3>' + item.name + '</h3>' +
        '<div class="muted">' + (item.category || '기타') + ' · ' + won(item.price) + (item.soldOut ? ' · 품절' : '') + '</div>' +
        '<div class="row" style="margin-top:10px;">' +
        '<button ' + (item.soldOut ? 'disabled' : '') + ' onclick="changeQty(\'' + item.id + '\', -1)">-</button>' +
        '<strong>' + (cart[item.id] || 0) + '</strong>' +
        '<button ' + (item.soldOut ? 'disabled' : '') + ' onclick="changeQty(\'' + item.id + '\', 1)">+</button>' +
        '</div></div>';
    }).join('');
    renderCart();
  }

  function changeQty(id, diff) {
    const next = Math.max(0, (cart[id] || 0) + diff);
    if (next === 0) delete cart[id];
    else cart[id] = next;
    renderMenus();
  }

  function renderCart() {
    const items = Object.keys(cart).map(function(id) {
      const menu = menus.find(m => m.id === id);
      return menu ? { ...menu, qty: cart[id] } : null;
    }).filter(Boolean);

    if (items.length === 0) {
      $('cartList').innerHTML = '선택한 메뉴가 없습니다.';
      $('totalText').innerText = '0원';
      return;
    }

    let total = 0;
    $('cartList').innerHTML = items.map(function(item) {
      total += Number(item.price) * item.qty;
      return '<div class="line"><span>' + item.name + ' x ' + item.qty + '</span><strong>' + won(item.price * item.qty) + '</strong></div>';
    }).join('');
    $('totalText').innerText = won(total);
  }

  async function submitOrder() {
    try {
      const items = Object.keys(cart).map(function(id) {
        const menu = menus.find(m => m.id === id);
        return menu ? { menuId:id, name:menu.name, price:Number(menu.price), qty:cart[id] } : null;
      }).filter(Boolean);

      if (items.length === 0) {
        alert('메뉴를 선택해주세요.');
        return;
      }

      const total = items.reduce((sum, item) => sum + item.price * item.qty, 0);
      await db.collection('orders').add({
        lane: lane,
        items: items,
        total: total,
        request: $('requestText').value || '',
        status: '새 주문',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      cart = {};
      $('requestText').value = '';
      renderMenus();
      alert('주문이 접수되었습니다.');
    } catch (error) {
      alert('주문 저장 실패: ' + error.message);
    }
  }

  function loginAdmin() {
    if ($('password').value !== ADMIN_PASSWORD) {
      alert('비밀번호가 틀렸습니다.');
      return;
    }
    $('loginBox').classList.add('hidden');
    $('adminBox').classList.remove('hidden');
    listenOrders();
  }

  async function testFirebase() {
    try {
      await db.collection('test').add({ message:'연결 테스트', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      alert('Firebase 테스트 저장 성공. Firestore 데이터 탭에 test 컬렉션이 생겨야 합니다.');
    } catch (error) {
      alert('Firebase 테스트 저장 실패: ' + error.message);
    }
  }

  async function saveMenu() {
    const id = $('editId').value;
    const name = $('menuName').value.trim();
    const price = Number($('menuPrice').value);
    const category = $('menuCategory').value;
    const soldOut = $('menuSoldOut').value === 'true';

    if (!name || !price) {
      alert('메뉴명과 가격을 입력해주세요.');
      return;
    }

    try {
      if (id) {
        await db.collection('menus').doc(id).update({ name, price, category, soldOut });
      } else {
        await db.collection('menus').add({ name, price, category, soldOut });
      }
      alert('메뉴가 Firebase에 저장되었습니다.');
      clearMenuForm();
    } catch (error) {
      alert('메뉴 저장 실패: ' + error.message);
    }
  }

  function clearMenuForm() {
    $('editId').value = '';
    $('menuName').value = '';
    $('menuPrice').value = '';
    $('menuCategory').value = '맥주';
    $('menuSoldOut').value = 'false';
  }

  function renderAdminMenus() {
    if (!$('adminMenuList')) return;
    if (menus.length === 0) {
      $('adminMenuList').innerHTML = '<p class="muted">등록된 메뉴가 없습니다.</p>';
      return;
    }

    $('adminMenuList').innerHTML = menus.map(function(item) {
      return '<div class="item">' +
        '<div class="between"><div><strong>' + item.name + '</strong><div class="muted">' + item.category + ' · ' + won(item.price) + ' · ' + (item.soldOut ? '품절' : '판매중') + '</div></div></div>' +
        '<button class="gray" onclick="editMenu(\'' + item.id + '\')">수정</button>' +
        '<button class="red" onclick="deleteMenu(\'' + item.id + '\')">삭제</button>' +
        '</div>';
    }).join('');
  }

  function editMenu(id) {
    const item = menus.find(m => m.id === id);
    if (!item) return;
    $('editId').value = item.id;
    $('menuName').value = item.name;
    $('menuPrice').value = item.price;
    $('menuCategory').value = item.category || '기타';
    $('menuSoldOut').value = item.soldOut ? 'true' : 'false';
  }

  async function deleteMenu(id) {
    if (!confirm('메뉴를 삭제할까요?')) return;
    try {
      await db.collection('menus').doc(id).delete();
      alert('메뉴가 삭제되었습니다.');
    } catch (error) {
      alert('메뉴 삭제 실패: ' + error.message);
    }
  }

  async function seedMenu() {
    try {
      const seed = [
        { id:'cass', name:'카스 병맥주', price:5000, category:'맥주', soldOut:false },
        { id:'terra', name:'테라 병맥주', price:5000, category:'맥주', soldOut:false },
        { id:'cola', name:'콜라', price:2000, category:'음료', soldOut:false },
        { id:'cider', name:'사이다', price:2000, category:'음료', soldOut:false },
        { id:'shrimp', name:'새우깡', price:2500, category:'과자', soldOut:false },
        { id:'pocachip', name:'포카칩', price:3000, category:'과자', soldOut:false }
      ];

      for (const item of seed) {
        await db.collection('menus').doc(item.id).set(item);
      }
      alert('기본 메뉴가 Firebase에 저장되었습니다.');
    } catch (error) {
      alert('기본 메뉴 저장 실패: ' + error.message);
    }
  }

  window.onload = start;
</script>
</body>
</html>
